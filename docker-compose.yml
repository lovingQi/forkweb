services:
  forkweb:
    build: .
    image: forkweb:latest
    container_name: forkweb
    ports:
      - "8081:80"
    environment:
      # 车端内嵌服务地址(jarvis-g 的 web_http_port)
      CAR_HOST: "192.168.1.10"
      CAR_PORT: "8080"
      # 如需前端直连车端(不走 nginx 代理)，可改为完整地址：
      # API_BASE: "http://192.168.1.10:8080/api"
      # WS_BASE:  "ws://192.168.1.10:8080/ws"
    restart: unless-stopped
