# forkweb Nginx 反向代理配置示例
# 适用于在 Docker 容器外使用 Nginx 作为入口，将流量转发到 forkweb 服务

upstream forkweb {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name _;

    # 可选：强制重定向到 HTTPS（配置证书后启用）
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://forkweb;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://forkweb/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://forkweb/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 运行时配置文件不缓存，便于切换后端地址
    location = /config.js {
        proxy_pass http://forkweb/config.js;
        add_header Cache-Control "no-store";
    }
}

